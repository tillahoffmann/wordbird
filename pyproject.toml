[project]
name = "paracorder"
version = "0.1.0"
description = "Voice dictation daemon using NVIDIA Parakeet on Apple Silicon"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "mlx-audio",
    "sounddevice",
    "numpy",
    "pyautogui",
    "pyobjc-core",
    "pyobjc-framework-Cocoa",
    "pyobjc-framework-Quartz",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/paracorder"]

[project.scripts]
paracorder = "paracorder.cli:main"
