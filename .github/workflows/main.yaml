name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: cp ../README.md .
      - run: uv sync
      - run: uv run pytest tests/ -v

  publish-pypi:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Build frontend and bundle into backend
      - run: cd frontend && npm ci && npm run build
      - run: cp -r frontend/dist backend/src/wordbird/server/static
      # Build Python package
      - run: cp README.md backend/
      - run: cd backend && uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist
          skip-existing: true

  publish-vscode:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc
      - run: npx vsce publish --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
