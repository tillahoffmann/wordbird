name: CI / Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cp ../README.md .
      - run: uv sync
      - run: uv run pytest tests/ -v

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Build frontend and bundle into backend
      - run: cd frontend && npm ci && npm run build
      - run: cp -r frontend/dist backend/src/wordbird/server/static
      # Build Python package
      - run: cp README.md backend/
      - run: cd backend && uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist

  publish-vscode:
    if: false  # TODO: enable once VSCE_PAT secret is configured
    needs: check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsc
      - run: npx vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
