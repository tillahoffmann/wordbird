repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: backend-tests
        name: backend tests
        entry: bash -c 'cd backend && uv run pytest tests/ -x -q'
        language: system
        files: ^backend/
        pass_filenames: false

      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/
        pass_filenames: false

      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd frontend && npx tsc'
        language: system
        files: ^frontend/
        pass_filenames: false
